<!DOCTYPE html>
<html>
<head>
    <title>Trackify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center mb-4">Welcome To Trackify</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-4 shadow-sm">
        <form method="POST">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" name="action" value="login" class="btn btn-primary w-100 mb-2">Login</button>
            <button type="submit" name="action" value="register" class="btn btn-outline-secondary w-100">Create New User</button>
        </form>
    </div>
</div>
</body>
</html>
