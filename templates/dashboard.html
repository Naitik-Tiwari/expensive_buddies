<!DOCTYPE html>
<html>
<head>
    <title>Trackify Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Hello, {{ username }}!</h2>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">Logout</a>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 shadow-sm mb-4">
                <h4>Add Expense</h4>
                <form action="{{ url_for('add_expense') }}" method="POST">
                    <input type="date" name="date" class="form-control mb-2" required>
                    <input type="text" name="category" class="form-control mb-2" placeholder="Category" required>
                    <input type="text" name="description" class="form-control mb-2" placeholder="Description" required>
                    <input type="number" name="amount" class="form-control mb-3" placeholder="Amount" required>
                    <button type="submit" class="btn btn-success w-100">Add</button>
                </form>
            </div>
            <div class="card p-3 shadow-sm text-center bg-primary text-white">
                <h4>Total Spending</h4>
                <h2>₹{{ total }}</h2>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3 shadow-sm">
                <h4>Your Expenses</h4>
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for exp in expenses %}
                        <tr>
                            <td>{{ exp.date }}</td>
                            <td>{{ exp.category }}</td>
                            <td>{{ exp.description }}</td>
                            <td>₹{{ exp.amount }}</td>
                        </tr>
                        {% else %}
                        <tr><td colspan="4" class="text-center">No expenses yet!</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
